name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install stave
        run: go install github.com/yaklabco/stave@v0.14.3

      - name: Install tools
        run: |
          go install gotest.tools/gotestsum@latest
          go install golang.org/x/tools/cmd/goimports@latest
          go install mvdan.cc/gofumpt@latest

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: binary
          args: --help

      - name: Lint and test
        run: stave lint:all test:all

      - name: Build
        run: stave build

      - name: Verify clean tree
        run: |
          if ! git diff --exit-code; then
            echo "::error::Working tree is dirty after build. Run 'stave' locally and commit the changes."
            exit 1
          fi
